; wintweak3.ini - ChrisTitusTech WinUtil Tweaks for FluentTweaker; Source: https://github.com/ChrisTitusTech/winutil (MIT License); Format: each section = one tweak entry;; Keys:;   Category          = display group;   Description       = human-readable explanation;   Path              = HKCU\Software\... or HKLM\System\... (hive + key in one line);   ValueName         = registry value name;   ValueType         = DWORD | String | Binary | QWord;   RecommendedValue  = value to write when applying the tweak;   DefaultValue      = Windows default — use <deletevalue> to delete only the value;   Restart           = system | explorer (omit if no restart needed);   RequiresAdmin     = true (omit — auto-detected for HKLM, HKCR, Policies keys);   OsVersion         = 10 | 11 (omit = applies to both);   Path2..N / ValueName2..N / ValueType2..N / RecommendedValue2..N / DefaultValue2..N;                     = additional registry entries changed by this tweak; ============================================================; TASKBAR; ============================================================[Taskbar Search Icon]Category=TaskbarDescription=Controls the Search button visibility in the taskbar. Disable to reclaim taskbar space.Path=HKCU\Software\Microsoft\Windows\CurrentVersion\SearchValueName=SearchboxTaskbarModeValueType=DWORDRecommendedValue=0DefaultValue=1OsVersion=11Restart=explorer[Taskbar Task View Button]Category=TaskbarDescription=Shows or hides the Task View button in the taskbar.Path=HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\AdvancedValueName=ShowTaskViewButtonValueType=DWORDRecommendedValue=0DefaultValue=1Restart=explorer[Taskbar Centered Icons]Category=TaskbarDescription=Centers taskbar icons (Windows 11 default). Disable to left-align them like Windows 10.Path=HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\AdvancedValueName=TaskbarAlValueType=DWORDRecommendedValue=0DefaultValue=1OsVersion=11Restart=explorer; ============================================================; FILE EXPLORER; ============================================================[Show File Extensions]Category=File ExplorerDescription=Makes file extensions (e.g. .txt, .jpg) visible in File Explorer. Recommended for all users.Path=HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\AdvancedValueName=HideFileExtValueType=DWORDRecommendedValue=0DefaultValue=1Restart=explorer[Show Hidden Files]Category=File ExplorerDescription=Shows hidden files and folders in File Explorer.Path=HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\AdvancedValueName=HiddenValueType=DWORDRecommendedValue=1DefaultValue=2Restart=explorer[Scrollbars Always Visible]Category=File ExplorerDescription=Keeps scrollbars permanently visible instead of auto-hiding them.Path=HKCU\Control Panel\AccessibilityValueName=DynamicScrollbarsValueType=DWORDRecommendedValue=0DefaultValue=1; ============================================================; START MENU; ============================================================[Disable Start Menu Bing Search]Category=Start MenuDescription=Removes Bing web results from Start Menu searches. Speeds up search and improves privacy.Path=HKCU\Software\Microsoft\Windows\CurrentVersion\SearchValueName=BingSearchEnabledValueType=DWORDRecommendedValue=0DefaultValue=1[Hide Start Menu Recommendations]Category=Start MenuDescription=Hides the Recommendations section in the Windows 11 Start Menu.Path=HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\StartValueName=HideRecommendedSectionValueType=DWORDRecommendedValue=1DefaultValue=0Path2=HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\EducationValueName2=IsEducationEnvironmentValueType2=DWORDRecommendedValue2=1DefaultValue2=0Path3=HKLM\SOFTWARE\Policies\Microsoft\Windows\ExplorerValueName3=HideRecommendedSectionValueType3=DWORDRecommendedValue3=1DefaultValue3=0OsVersion=11[Hide Settings Home Page]Category=Start MenuDescription=Hides the Home page from the Windows 11 Settings app.Path=HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\ExplorerValueName=SettingsPageVisibilityValueType=StringRecommendedValue=hide:homeDefaultValue=show:homeOsVersion=11; ============================================================; APPEARANCE; ============================================================[Dark Theme]Category=AppearanceDescription=Enables the dark mode interface for both apps and the Windows shell.Path=HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\PersonalizeValueName=AppsUseLightThemeValueType=DWORDRecommendedValue=0DefaultValue=1Path2=HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\PersonalizeValueName2=SystemUsesLightThemeValueType2=DWORDRecommendedValue2=0DefaultValue2=1Restart=explorer[Battery Percentage in Tray]Category=AppearanceDescription=Shows the numeric battery percentage alongside the battery icon in the system tray.Path=HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\AdvancedValueName=IsBatteryPercentageEnabledValueType=DWORDRecommendedValue=1DefaultValue=0OsVersion=11[Logon Screen Acrylic Blur]Category=AppearanceDescription=Enables or disables the acrylic blur effect on the Windows login screen background.Path=HKLM\SOFTWARE\Policies\Microsoft\Windows\SystemValueName=DisableAcrylicBackgroundOnLogonValueType=DWORDRecommendedValue=1DefaultValue=0; ============================================================; ACCESSIBILITY; ============================================================[Disable Sticky Keys Popup]Category=AccessibilityDescription=Disables the Sticky Keys dialog that pops up when pressing Shift 5 times rapidly.Path=HKCU\Control Panel\Accessibility\StickyKeysValueName=FlagsValueType=DWORDRecommendedValue=58DefaultValue=510[Disable Mouse Acceleration]Category=AccessibilityDescription=Turns off pointer precision for more predictable, 1:1 cursor movement. Recommended for gaming.Path=HKCU\Control Panel\MouseValueName=MouseSpeedValueType=DWORDRecommendedValue=0DefaultValue=1Path2=HKCU\Control Panel\MouseValueName2=MouseThreshold1ValueType2=DWORDRecommendedValue2=0DefaultValue2=6Path3=HKCU\Control Panel\MouseValueName3=MouseThreshold2ValueType3=DWORDRecommendedValue3=0DefaultValue3=10[Num Lock on Startup]Category=AccessibilityDescription=Enables Num Lock automatically when Windows starts.Path=HKU\.Default\Control Panel\KeyboardValueName=InitialKeyboardIndicatorsValueType=StringRecommendedValue=2DefaultValue=0Path2=HKCU\Control Panel\KeyboardValueName2=InitialKeyboardIndicatorsValueType2=StringRecommendedValue2=2DefaultValue2=0; ============================================================; PERFORMANCE; ============================================================[Enable Game Mode]Category=PerformanceDescription=Prioritizes system resources for games. Disable if you notice audio/video production issues.Path=HKCU\Software\Microsoft\GameBarValueName=AllowAutoGameModeValueType=DWORDRecommendedValue=1DefaultValue=0Path2=HKCU\Software\Microsoft\GameBarValueName2=AutoGameModeEnabledValueType2=DWORDRecommendedValue2=1DefaultValue2=0[Disable Multiplane Overlay]Category=PerformanceDescription=Fixes graphical glitches and stuttering caused by MPO on certain AMD and NVIDIA cards.Path=HKLM\SOFTWARE\Microsoft\Windows\DwmValueName=OverlayTestModeValueType=DWORDRecommendedValue=5DefaultValue=0Path2=HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDriversValueName2=DisableOverlaysValueType2=DWORDRecommendedValue2=1DefaultValue2=0Restart=system[Enable S3 Sleep]Category=PerformanceDescription=Switches from Modern Standby (S0) to traditional S3 sleep. Reduces passive power drain on some laptops.Path=HKLM\SYSTEM\CurrentControlSet\Control\PowerValueName=PlatformAoAcOverrideValueType=DWORDRecommendedValue=0DefaultValue=<deletevalue>Restart=system[Enable Long File Paths]Category=PerformanceDescription=Removes the 260-character path limit. Required by some dev tools and deeply nested folder structures.Path=HKLM\SYSTEM\CurrentControlSet\Control\FileSystemValueName=LongPathsEnabledValueType=DWORDRecommendedValue=1DefaultValue=0[Disable S0 Sleep Network Activity]Category=PerformanceDescription=Prevents network access during S0 (Modern Standby) sleep to avoid background wake-ups and battery drain.Path=HKCU\SOFTWARE\Policies\Microsoft\Power\PowerSettings\f15576e8-98b7-4186-b944-eafa664402d9ValueName=ACSettingIndexValueType=DWORDRecommendedValue=0DefaultValue=1; ============================================================; PRIVACY; ============================================================[Disable Cross-Device Resume]Category=PrivacyDescription=Disables the Cross-Device Resume feature that syncs recent activity between your Windows 11 devices.Path=HKCU\Software\Microsoft\Windows\CurrentVersion\CrossDeviceResume\ConfigurationValueName=IsResumeAllowedValueType=DWORDRecommendedValue=0DefaultValue=1OsVersion=11[Use Classic Outlook]Category=PrivacyDescription=Keeps classic Outlook and hides the toggle to switch to the new Outlook app.Path=HKCU\SOFTWARE\Microsoft\Office\16.0\Outlook\PreferencesValueName=UseNewOutlookValueType=DWORDRecommendedValue=0DefaultValue=1Path2=HKCU\Software\Microsoft\Office\16.0\Outlook\Options\GeneralValueName2=HideNewOutlookToggleValueType2=DWORDRecommendedValue2=1DefaultValue2=0Path3=HKCU\Software\Policies\Microsoft\Office\16.0\Outlook\Options\GeneralValueName3=DoNewOutlookAutoMigrationValueType3=DWORDRecommendedValue3=0DefaultValue3=1Path4=HKCU\Software\Policies\Microsoft\Office\16.0\Outlook\PreferencesValueName4=NewOutlookMigrationUserSettingValueType4=DWORDRecommendedValue4=0DefaultValue4=1; ============================================================; DIAGNOSTICS; ============================================================[BSoD Verbose Mode]Category=DiagnosticsDescription=Shows detailed technical error info on Blue Screen of Death instead of the generic smiley face.Path=HKLM\SYSTEM\CurrentControlSet\Control\CrashControlValueName=DisplayParametersValueType=DWORDRecommendedValue=1DefaultValue=0Path2=HKLM\SYSTEM\CurrentControlSet\Control\CrashControlValueName2=DisableEmoticonValueType2=DWORDRecommendedValue2=1DefaultValue2=0[Verbose Logon Messages]Category=DiagnosticsDescription=Displays detailed status messages during login and logout. Useful for troubleshooting slow logons.Path=HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\SystemValueName=VerboseStatusValueType=DWORDRecommendedValue=1DefaultValue=0